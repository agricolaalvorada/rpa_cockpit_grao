# Definição declarativa dos processos de escrituração.
# Caminhos SQL são relativos à pasta sql/. A ORDEM é preservada (afeta o payload/Teams).
version: 1
processos:
  - process_name: V2_Consulta_Comp_CTRFIXO
    postgres_sql: postgres/consultas/Consulta_Comp_CTRFIXO.sql
    hana_sql: sap_hana/consultas/Consulta_Comp_CTRFIXO.sql
    parametros: [doc_compra, numero_cockpit]
    tabela_destino: tb_resultado_final_hana
    ativo: true
    truncate_before_insert: false
    drop_and_create: false

  - process_name: V2_Consulta_Comp_CTR_S_FIXACAO
    postgres_sql: postgres/consultas/Consulta_Comp_CTR_S_FIXACAO.sql
    hana_sql: sap_hana/consultas/Consulta_Comp_CTR_S_FIXACAO.sql
    parametros: [doc_compra, numero_cockpit]
    tabela_destino: tb_resultado_final_hana
    ativo: true
    truncate_before_insert: false
    drop_and_create: false

  - process_name: V2_Consulta_Comp_ARMAZEN
    postgres_sql: postgres/consultas/Consulta_Comp_ARMAZEN.sql
    hana_sql: sap_hana/consultas/Consulta_Comp_ARMAZEN.sql
    parametros: [n_contrato, numero_cockpit]
    tabela_destino: tb_resultado_final_hana
    ativo: true
    truncate_before_insert: false
    drop_and_create: false
